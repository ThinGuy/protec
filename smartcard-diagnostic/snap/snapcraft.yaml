name: smartcard-diagnostic
base: core24
version: '2.0.0'
summary: Smart Card Diagnostic Tool
description: |
  Professional diagnostic and monitoring tool for government and enterprise
  smart card deployments. Supports PIV cards and enterprise PKI systems.

  Features:
  - Real-time card/reader detection
  - Certificate validation
  - FIPS compliance checking
  - Support bundle generation

  Designed for Ubuntu Desktop and Ubuntu Core.

grade: devel
confinement: devmode

platforms:
  amd64:
  arm64:

apps:
  smartcard-diagnostic:
    command: bin/smartcard-diagnostic
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - home
      - removable-media
      - hardware-observe
      - network
      - network-bind
      - opengl
    environment:
      LD_LIBRARY_PATH: $SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib
      PATH: $SNAP/usr/bin:$SNAP/usr/sbin:$PATH

  monitor:
    command: bin/smartcard-monitor
    daemon: simple
    restart-condition: always
    plugs:
      - hardware-observe
      - network
    slots:
      - dbus-smartcard

slots:
  dbus-smartcard:
    interface: dbus
    bus: system
    name: com.canonical.SmartCardMonitor

parts:
  smartcard-diagnostic:
    plugin: nil
    source: .
    build-snaps:
      - flutter/latest/stable
    build-packages:
      - clang
      - cmake
      - curl
      - git
      - libgtk-3-dev
      - ninja-build
      - pkg-config
      - unzip
      - xz-utils
    override-build: |
      flutter config --enable-linux-desktop
      flutter precache --linux
      flutter pub get
      # Regenerate linux/flutter/ephemeral/ for the build-snap Flutter SDK
      flutter create --platforms=linux .
      flutter build linux --release --target lib/main.dart
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp -r build/linux/x64/release/bundle/* $CRAFT_PART_INSTALL/bin/
      mv $CRAFT_PART_INSTALL/bin/smartcard_diagnostic $CRAFT_PART_INSTALL/bin/smartcard-diagnostic
    stage-packages:
      - libgtk-3-0
      - libgdk-pixbuf2.0-0
      - libglib2.0-0
      - libblkid1
      - libc6
      - libgcc-s1
      - libpcre2-8-0
      - libstdc++6
      - libegl1
      - libegl-mesa0
      - libgl1
      - libglx-mesa0
      - libglx0
      - libgles2

  monitor-daemon:
    plugin: dump
    source: daemon/
    stage-packages:
      - python3
      - python3-dbus
      - python3-gi
      - gir1.2-glib-2.0
    override-build: |
      craftctl default
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp smartcard_monitor.py $CRAFT_PART_INSTALL/bin/smartcard-monitor
      chmod +x $CRAFT_PART_INSTALL/bin/smartcard-monitor
    organize:
      com.canonical.SmartCardMonitor.service: usr/share/dbus-1/system-services/com.canonical.SmartCardMonitor.service
      com.canonical.SmartCardMonitor.conf: usr/share/dbus-1/system.d/com.canonical.SmartCardMonitor.conf

  system-dependencies:
    plugin: nil
    stage-packages:
      - opensc
      - opensc-pkcs11
      - pcsc-tools
      - libpcsclite1
      # REMOVED: pcscd, libccid, libpam-pkcs11, gnutls-bin
      # pcscd must NOT be bundled — use the host pcscd socket or the
      # shared pcscd snap content interface. Two pcscd daemons cannot
      # coexist on the same CCID reader.
