<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow the snap daemon to own com.canonical.SmartCardMonitor on
       the system bus.  Without this policy the daemon's
       dbus.service.BusName() call will be denied and it will crash. -->
  <policy user="root">
    <allow own="com.canonical.SmartCardMonitor"/>
  </policy>

  <!-- Allow any local user to call all methods and receive all signals.
       Tighten to specific UIDs / groups once the snap is published. -->
  <policy context="default">
    <allow send_destination="com.canonical.SmartCardMonitor"/>
    <allow receive_sender="com.canonical.SmartCardMonitor"/>
  </policy>
</busconfig>
